name: Release smoke checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-release-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python sources
        run: python -m compileall -q scripts ablation_scripts diagnostics finetune toy
      - name: Check shell syntax
        run: bash -n toy/*.sh ablation_scripts/*.sh
      - name: Check release layout
        run: python tests/test_release_layout.py
